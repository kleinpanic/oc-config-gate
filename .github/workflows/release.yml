name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm pack

      - uses: softprops/action-gh-release@v2
        with:
          files: oc-config-gate-*.tgz
          generate_release_notes: true

